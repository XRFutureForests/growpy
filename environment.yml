name: the-grove
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy=1.*
  - pandas
  - matplotlib
  - scikit-learn
  - tqdm
  
  # Blender Python API bundles compatible USD (pxr) since Blender 4.4+
  # Access via bpy.utils.expose_bundled_modules() - no separate USD package needed
  - pip:
    - bpy>=4.5  # Blender Python API with bundled USD, MaterialX, OpenImageIO, etc.

variables:
  PYTHONPATH: ./src:./src/the_grove_22/modules
