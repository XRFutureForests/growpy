name: the-grove
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - matplotlib
  - scikit-learn
  - tqdm
  - ipykernel
  - pip:
    - bpy  # Blender Python API with bundled USD, MaterialX, OpenImageIO, etc.
    - unreal-remote-execution

variables:
  PYTHONPATH: ./src:./src/the_grove_22/modules
