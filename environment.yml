name: the-grove
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - matplotlib
  - scikit-learn
  - tqdm
  - ipykernel
  - pillow
  - pip:
      - bpy # Blender Python API with bundled USD, MaterialX, OpenImageIO, etc.

variables:
  PYTHONPATH: ./src:./src/the_grove_22/modules
  # Ensure Unreal's USD schemas are discoverable by pxr/USD
  # On macOS, multiple plugin paths are colon-separated
  PXR_PLUGINPATH_NAME: ./data/unreal_schema/linux
