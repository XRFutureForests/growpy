name: growpy
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - matplotlib
  - scikit-learn
  - tqdm
  - ipykernel
  - pillow
  - pip:
      - bpy # Blender Python API with bundled USD, MaterialX, OpenImageIO, etc.

variables:
  PYTHONPATH: ./src:./src/the_grove_23/modules
