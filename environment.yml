name: growpy
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13
  - pip
  - numpy>=1.24,<2.3 # cap: numpy 2.4.x crashes matplotlib's compiled transform/Agg path (native fault during preview/icon rendering)
  - pandas>=2.0
  - matplotlib
  - scikit-learn
  - tqdm
  - joblib
  - ipykernel
  - pillow
  - openpyxl # XLSX yield table parsing (Kohlenstoff-Ertragstafeln)
  - scipy>=1.10
  - pip:
      - openyieldtables # For real-world yield data calibration
      - bpy==5.1.2 # Blender Python API with bundled USD, MaterialX, OpenImageIO, etc. (pinned: latest with win_amd64 wheel for cp313)
      - tabula-py # PDF yield table extraction (requires Java runtime)
      - python-dotenv>=1.0.0
      - pylometree @ git+https://github.com/XRFutureForests/pylometree.git

variables:
  PYTHONPATH: ./src:./src/the_grove_23/modules
