# GrowPy Configuration File
# This file allows customization of tree generation parameters for the generate_forest script
# Copy this file to 'config.ini' and modify the values as needed

[simulation]
# Number of flushes used specifically for height curve generation
# This determines how many growth cycles are simulated to create height models
# Reduce this number to decrease simulation time (e.g., 75, 50, or 30 for faster processing)
height_model_flushes = 75

# Maximum growth cycles for forest simulation (auto-calculated if not set)
# If not specified, this will be calculated based on the maximum predicted tree age
# growth_cycles = none

# Random seed for reproducible results (set to 'none' for random behavior)
random_seed = 42

# Age to flush ratio - how many years of real tree age per growth flush
# Keep at 1.0 to maintain proper height relationships between species
# Do NOT modify this to reduce simulation time - use height_model_flushes instead
age_to_flush_ratio = 1.0

[output]
# Base output directory for all generated files
output_dir = data/output

# Specific directory for FBX exports (uses output_dir/fbx if not set)
fbx_output_dir = none

[build]
# 3D model generation parameters
# These affect the polygon count and visual quality of generated models

# Base resolution (number of sides for branch cross-sections)
resolution = 16

# How quickly to reduce resolution on thinner branches (0.0-1.0)
resolution_reduce = 0.8

# Number of times to repeat bark texture around circumference
texture_repeat = 3

# Stop building branches after this age (0 = build all)
build_cutoff_age = 0

# Stop building branches thinner than this diameter
build_cutoff_thickness = 0.0

# Add smooth transitions between main and side branches
build_blend = true

# Add geometry caps to branch ends
build_end_cap = true
