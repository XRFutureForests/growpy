# GrowPy Twig Conversion Settings
# Used by step 2: convert_twigs.py (growpy-convert-twigs)

[twigs]
# Path to twig directory containing .blend files
# Used as default when convert_twigs.py is run without a positional argument
path = "data/assets/twigs"
# Directory for custom (non-Grove) twig .blend files with textures
# Copied to data/assets/twigs/ by prepare_assets.py alongside Grove twigs
# Use for hand-curated twigs (e.g., Helios-classified variants with fruit materials)
custom_twigs_dir = "data/input/custom_twigs"
# Master switch for all mesh geometry processing (densify, contour cut, decimation)
# When false, .blend twig meshes are exported to USD as-is without any modification
# When true, enables the sub-options below for Nanite-friendly high-poly silhouettes
densify = true
# Alpha threshold for silhouette trimming
# 0.05-0.3 = minimal (conservative), 0.5 = moderate (recommended), 0.7 = aggressive
alpha_trim = 0.9
# Target edge length for leaf-face pre-densification in millimeters.
# Leaf edges are subdivided to this length before the alpha contour cut so the
# silhouette has enough vertex density to carve through. Also controls Nanite
# interior detail. 0.5 mm is a good default; lower = denser, higher = coarser.
boundary_edge_mm = 0.5
# Interior decimation ratio for leaf meshes (0.0 = disabled, 0.3 = keep 30%)
# Simplifies interior triangles while preserving alpha-trimmed silhouette edges.
# Branch cylinders and boundary silhouette vertices are always protected.
# Ignored when interior_edge_mm > 0.
interior_decimate_ratio = 0.000001
# Target interior edge length in millimeters (0 = disabled, uses ratio instead)
# When set, derives the decimation ratio automatically so interior faces
# converge to this edge size regardless of input resolution.
interior_edge_mm = 0
# Number of vertex rings inward from the mesh boundary to protect from decimation.
# 0 = protect only boundary verts, 1 = also protect first interior ring, etc.
# Higher values preserve silhouette fidelity but leave more faces unchanged.
interior_boundary_rings = 3
