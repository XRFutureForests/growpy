# GrowPy Unreal Engine Import Settings
#
# Controls UE Python import script generation, Nanite build settings,
# and PVE (Procedural Vegetation Editor) preset import.

[unreal]
# Generate Unreal Python import script (unreal_import_trees.py / unreal_cleanup_trees.py)
import_to_unreal = true
# Unreal content path for imported assets in Content Browser
project_path = "/Game/Assets/TheGrove"
# Automatically set Nanite shape preservation to Voxelize on imported assemblies.
# Voxelization produces the best visual quality but adds significant import time.
# Set to false for faster testing iterations; re-enable for production exports.
voxelization = false
# Nanite fallback mesh triangle percentage (0.0-1.0).
# The fallback mesh is used when Nanite is unavailable: complex collision
# queries, ray tracing without Nanite RT, mobile, editor "Nanite off" view.
# Lower values reduce build time and VRAM at no visual cost when Nanite renders.
# 0.01 = keep 1% of triangles (recommended), 1.0 = keep all (wasteful).
nanite_fallback_percent = 0.01
# Nanite fallback heuristic: "percent_triangles", "relative_error", "auto".
# CRITICAL: if left at engine default (often "auto"/"relative_error"), the
# fallback_percent value above may be silently ignored, leaving fallbacks
# much heavier than intended. Setting this explicitly is the single biggest
# import-perf win for forests where Nanite is always available.
nanite_fallback_target = "percent_triangles"
# Interpolate UVs during Nanite mesh simplification.
# Should be true for textured meshes to avoid UV seam artifacts at distance.
nanite_lerp_uvs = true

# --- PVE preset import (UE 5.7+ Procedural Vegetation Editor) ---
# Generates a complementary UE Python script that creates
# ProceduralVegetationPreset DataAssets from per-tree PVE JSON recipes,
# alongside the existing skeletal-mesh assembly import. Requires the
# Procedural Vegetation Editor plugin to be enabled in UE.
# Combined presets and PVE graphs are colocated with tree meshes
# at <project_path>/<species>/<scene>/.
generate_pve_presets = false
# Generate the UE wind-import script that applies *_DynamicWind.json sidecars
# to skeletal meshes (per-tree wind JSON is always exported regardless).
generate_wind_data = true
