name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      # Blocking gate: bug-level lint (undefined names, syntax, logic errors).
      # These catch real defects and must stay green.
      - name: Ruff (critical)
        run: uvx ruff check src/growpy --select F82,F63,F7,E9

      # Non-blocking: full lint surface (style/bugbear/import order) as
      # annotations. Ratchet these into the blocking gate as the backlog clears.
      - name: Ruff (full, advisory)
        run: uvx ruff check src/growpy
        continue-on-error: true

      - name: Ruff format check (advisory)
        run: uvx ruff format --check src/growpy
        continue-on-error: true

      - name: Mypy (advisory)
        run: uvx --with-editable . mypy
        continue-on-error: true

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      # bpy provides the bundled USD (pxr) build the exporters import, and the
      # tests/conftest.py imports it first so its bundled DLLs win the load race
      # against numpy/scipy/Pillow (otherwise bpy aborts intermittently). Do NOT
      # also install usd-core here: two USD builds in one process conflict.
      - name: Install system libs for headless bpy
        run: sudo apt-get update && sudo apt-get install -y libgl1 libxi6 libxxf86vm1 libxfixes3 libxrender1

      - name: Install package
        run: uv pip install -e ".[dev]" bpy

      - name: Pytest
        run: uv run --no-project pytest
