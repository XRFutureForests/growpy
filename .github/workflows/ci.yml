name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      # Blocking gate: bug-level lint (undefined names, syntax, logic errors).
      # These catch real defects and must stay green.
      - name: Ruff (critical)
        run: uvx ruff check src/growpy --select F82,F63,F7,E9

      # Non-blocking: full lint surface (style/bugbear/import order) as
      # annotations. Ratchet these into the blocking gate as the backlog clears.
      - name: Ruff (full, advisory)
        run: uvx ruff check src/growpy
        continue-on-error: true

      - name: Ruff format check (advisory)
        run: uvx ruff format --check src/growpy
        continue-on-error: true

      - name: Mypy (advisory)
        run: uvx --with-editable . mypy
        continue-on-error: true

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      # NOTE: bpy and usd-core both ship their own USD build and cannot be
      # imported in the same process (DLL/.so clash). Until the suite is split
      # into bpy-only and usd-core-only runs, tests are advisory.
      - name: Install package
        run: uv pip install --system -e ".[dev,export]"

      - name: Pytest (advisory until test isolation lands)
        run: uv run --no-project pytest
        continue-on-error: true
