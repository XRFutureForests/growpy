[tool:pytest]
minversion = 6.0
addopts = 
    -ra
    -q
    --strict-markers
    --strict-config
    --disable-warnings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: marks tests as integration tests requiring Grove installation
    slow: marks tests as slow (deselect with '-m "not slow"')
    unit: marks tests as unit tests (can run without Grove)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
