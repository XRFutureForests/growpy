# GrowPy Central Configuration
# All CLI scripts read defaults from this file.
# CLI arguments override these values when provided.
#
# Resolution order: dataclass defaults -> TOML files -> CLI arguments
#
# Configuration is split across sibling TOML files:
#   config/growpy.toml       - Pipeline settings (this file)
#   config/quality.toml      - Quality presets and density variants
#   config/unreal.toml       - Unreal Engine import and Nanite settings
#   config/helios.toml       - Helios++ LiDAR export settings
#   config/competition.toml  - Competition groups and thinning schedules
#
# To use a custom config directory, set GROWPY_CONFIG to the main file:
#   GROWPY_CONFIG=/path/to/custom/growpy.toml python src/growpy/cli/generate_forest.py

[general]
# Random seed for reproducible tree generation (remove to randomize)
random_seed = 27
# Default input CSV with tree positions and species
# CSV columns: x, y, species, height (optional: z, fid, dbh)
csv_file = "data/input/dataset/all_species.csv"
# Output directory for generated trees (species subdirectories created automatically)
output_dir = "data/output/forest"
# Enable verbose output (INFO-level logging). Use --verbose / --quiet to override.
verbose = true
# Enable profiling to track execution time of each pipeline step
profile = true

# --- Step 1: prepare_assets.py ---
[assets]
# Path to The Grove 2.3 installation directory
# Must contain presets/, twigs/, and textures/ subdirectories
grove_dir = "src/the_grove_23"
# Resize textures to power-of-2 for Unreal Engine virtual textures
# Adds significant processing time; only needed if Grove textures are not already power-of-2
resize_textures = true

# --- Step 2: convert_twigs.py ---
[twigs]
# Path to twig directory containing .blend files
# Used as default when convert_twigs.py is run without a positional argument
path = "data/assets/twigs"
# Directory for custom (non-Grove) twig .blend files with textures
# Copied to data/assets/twigs/ by prepare_assets.py alongside Grove twigs
# Use for hand-curated twigs (e.g., Helios-classified variants with fruit materials)
custom_twigs_dir = "data/input/custom_twigs"
# Master switch for all mesh geometry processing (alpha trim, smoothing, decimation)
# When false, .blend twig meshes are exported to USD as-is without any modification
# When true, enables the sub-options below for Nanite-friendly high-poly silhouettes
densify = true
# Alpha threshold for silhouette trimming
# 0.05-0.3 = minimal (conservative), 0.5 = moderate (recommended), 0.7 = aggressive
alpha_trim = 0.9
# Enable boundary edge smoothing for natural silhouette curves
smooth_boundary = true
# Number of Laplacian smoothing passes (1-10)
smooth_iterations = 20
# Smoothing strength per iteration (0.0-1.0)
smooth_factor = 0.2
# Target boundary edge length in millimeters (0.1-5.0)
# Boundary edges longer than this are split at their midpoint during densification.
# Lower = finer silhouette detail, higher = fewer faces. 0.5 mm is a good default.
boundary_edge_mm = 0.001
# Interior decimation ratio for leaf meshes (0.0 = disabled, 0.3 = keep 30%)
# Simplifies interior triangles while preserving alpha-trimmed silhouette edges.
# Branch cylinders and boundary silhouette vertices are always protected.
# Ignored when interior_edge_mm > 0.
interior_decimate_ratio = 0.000001
# Target interior edge length in millimeters (0 = disabled, uses ratio instead)
# When set, derives the decimation ratio automatically so interior faces
# converge to this edge size regardless of input resolution.
interior_edge_mm = 0
# Number of vertex rings inward from the mesh boundary to protect from decimation.
# 0 = protect only boundary verts, 1 = also protect first interior ring, etc.
# Higher values preserve silhouette fidelity but leave more faces unchanged.
interior_boundary_rings = 3

# --- Step 3: create_growth_models.py ---
[growth_models]
# Maximum growth cycles to simulate (1-250)
# Automatically stops early when growth plateaus
cycles = 55
# Random seeds to average for robust curves (1-10)
# Use 3+ for production, 1 for quick tests
seeds = 1
# Minimum height increase per cycle to consider as growth (meters)
# Lower values = more sensitive plateau detection
height_threshold = 0.01
# Stop after N consecutive cycles without significant growth (1-20)
# Lower values = earlier termination, prevents wasting time on plateaued trees
max_cycles_without_growth = 3
# Maximum simulation time per seed in seconds (10-3600)
# Increase for complex species; prevents stuck simulations
timeout = 600

# --- Step 3b: Yield table calibration (integrated into create_growth_models.py) ---
[calibration]
# When enabled, create_growth_models.py automatically calibrates against yield tables
# after the initial simulation, then re-simulates with calibration applied.
enabled = true
# Align grove height growth to yield table height curve.
# Applies per-cycle grow_length multipliers from calibrated seed.json files during
# simulation (step 4). Only affects overall growth speed, not branch shape.
# When cycles exceed the calibration array length, the last value is held.
# false = use original Grove grow_length values from seed.json (no height alignment)
align_height = true
# Align grove trunk DBH to yield table DBH curve.
# Applies radial scaling at export to match target DBH from calibrated seed.json files.
# Scales trunk mesh perpendicular to bone axes at breast height (1.3m), blending
# smoothly to 1.0 at the crown. Only affects trunk thickness, not branch shape.
# false = export Grove geometry as-is (trunk may be thicker/thinner than yield table)
align_dbh = true
# Directory for local yield table CSVs.
# Format: age,height,dbh (age in years, height in meters, dbh in centimeters)
# File naming: <standardized_species_name>.csv (e.g., norway_spruce.csv)
yield_tables_dir = "data/input/yield_tables"
# Generate comparison plots (even without calibration)
# Plots are saved alongside growth models in data/assets/growth_models/<species>/
plot = true
# Yield table resolution order per species:
#   1. Local CSV in yield_tables_dir (by standardized name)
#   2. Ingested store (pylometree-ingest output in yield_sources.store_dir)
# Species without yield data use uncalibrated Grove output for both height and DBH.

# --- Yield table store ---
# Pre-ingested yield tables from pylometree providers.
# Run: pylometree-ingest --store-dir data/input/yield_tables/store
[yield_sources]
# Directory for the normalized yield table store (ingested CSVs + manifest)
store_dir = "data/input/yield_tables/store"
# Preferred region filter for table selection (case-insensitive exact match)
# Current store regions: "DE", "DE-NW", "DE-Central", "EU-West"
# Empty string = no filter (selects from all regions by best site index)
preferred_region = ""
# Preferred site index for table selection (closest match).
# Uses the provider's site index scale (e.g., German Ertragsklasse: 1=best).
# The manifest h50 column (height at age 50 in meters) provides a universal
# metric for cross-referencing with other SI definitions.
# When set, overrides the automatic grove h50-based selection for all species.
# Per-species overrides in [calibration.species."..."] take priority.
# 0 = no preference (auto-select by simulated grove h50)
preferred_site_index = 0

# --- Dataset CSV planner ---
[dataset]
# Number of competition neighbors around the center tree (3, 4, 5, or 6)
# Neighbors are placed in a regular polygon at species-specific spacing.
# 3 = equilateral triangle, 4 = square, 5 = pentagon, 6 = hexagon
competition_neighbors = 3

# --- Step 4: generate_forest.py ---
[forest]
# Quality preset: ultra, high, medium, low, performance
# See [quality.*] sections below for per-preset parameters
quality = "high"
# Maximum growth cycles per tree (1-250)
# Trees exceeding this limit are capped (not scaled)
growth_cycle_limit = 55
# Number of grove.smooth() passes on branch angles (int, 0-20, 0 = disabled)
# Each pass reduces sharp corner angles between branch segments.
# Higher values = smoother, more organic branches; 10-20 for production.
smooth_iterations = 3
# Include Grove metadata (age, mass, vigor) in USD files
# Increases file size by ~70%; useful for analysis
include_grove_attributes = false
# Multi-stage export: generate tree models at height intervals
# Exports snapshots every N meters of height (e.g., 5 = 5m, 10m, 15m...)
# Uses growth models to determine which cycle corresponds to each height milestone
# Each snapshot includes height and DBH in the filename for easy asset selection
# 0 = disabled (standard single height-based export)
height_interval = 5
# Cap all tree heights at this value in meters (e.g., 15 for quick testing)
# Trees taller than this in the input CSV are clamped to this height
# Reduces growth cycles and number of height stages for faster runs
# 0 = no limit (use full CSV heights)
max_height = 15

# Quality presets defined in quality.toml (selected by name above).

# --- Step 4 (cont.): Export options ---
[export]
# USD file format: "usda" (ASCII, human-readable) or "usdc" (binary, smaller/faster)
# Binary USDC files are ~50% smaller on disk and faster for UE to parse,
# significantly reducing memory pressure during import.
usd_format = "usda"
# Export skeletal mesh assemblies (required for Unreal animation/wind)
skeletal = true
# Export static mesh assemblies (geometry only, no skeleton)
# When both skeletal and static are enabled, static is derived from skeletal
static = false
# Base twig density multiplier applied to all trees globally.
# Values > 1.0 add synthetic twigs; values < 1.0 thin existing placements.
# Compensates for twig loss from build_cutoff.
# Per-tree scaling: the input CSV twig_density column is a scale factor
# multiplied with this base (e.g., base=2.0, CSV=0.5 -> effective 1.0).
# Range: 0.0 (no twigs) to 3.0+ (dense canopy)
twig_density = 1
# Youth bias exponent for synthetic twig placement.
# Controls how strongly additional twigs prefer younger branches.
# 1.0 = linear (default), >1.0 = stronger youth preference, <1.0 = more uniform.
# At 2.0 a branch at youth=0.5 gets 25% weight vs 100% for the youngest.
# Range: 0.0 (uniform placement) to 3.0+ (extreme youth preference)
youth_bias = 1
# Skip PVE preset JSON generation (saves ~3% export time)
# PVE presets only needed for Unreal Procedural Vegetation Editor
skip_pve_json = false
# Maximum skeleton joints for Nanite Assembly USD export.
# Nanite encodes bone indices in 8-bit fields (max 256).
# 0 = no limit (use for PVE native skeletal mesh path which has no constraint).
# 250 = safe default for Nanite Assembly USD import path.
max_skeleton_joints = 0
# Maximum twig instances per Nanite Assembly.
# During UE import, NaniteAssemblyRootAPI expands all instances into a combined
# Nanite mesh which can consume extreme amounts of RAM.
# 0 = no limit.  5000 = safe default for 64 GB systems.
# Instances beyond this limit are randomly removed (uniform across twig types).
max_assembly_instances = 2000
# Skip assembly validation (saves ~5-10% export time)
skip_validation = true
# Only export specific trees by fid (integer array)
# Other trees still participate in growth simulation (light competition, shading)
# but only the listed trees produce output files
# Useful for studying a single tree growing among neighbors
# Empty array = export all trees
export_trees = []
# Density variants: export multiple density levels from a single simulation.
# Each simulation produces one file per variant without re-simulating.
# Empty list (default) = single export using CSV/config twig_density.
# When active, CSV twig_density column is ignored.
# Variant definitions are in quality.toml under [density_variant.*].
density_variants = [] # e.g., ["full", "reduced", "bare"]
