# GrowPy Surround

# Grove's built-in Surround feature shades a tree against a statistical shell of
# virtual neighbours instead of simulating real neighbour trees. This gives the
# tall, slender, self-pruned form of a forest-grown tree at a fraction of the
# cost of the multi-tree competition clusters it replaces.
#
# Applied to single-tree groves whose individual_type == "surround" (as produced
# by the dataset planner), or to every single-tree grove when enabled = true.
# Grove disables Surround when several trees are simulated together in one grove,
# so this only affects single-tree contexts.

[surround]
enabled = false   # true = enable on all single-tree groves
density = 0.7     # surrounding tree density (0..1)
distance = 7.0    # distance to the shell (meters)
height = 5.0      # shell height (meters)
grow = true       # shell grows together with the tree
