# GrowPy Configuration File
# Place this file in the same directory as your script to override defaults

[simulation]
# Random seed for reproducible tree generation (integer or 'none' for random)
# Default: 42
random_seed = 42

[output]
# Directory for exported tree models
# Default: output
output_dir = output

[build]
# LOD levels to export: 'all' or comma-separated list: LOD1_High, LOD2_Medium, LOD3_Low
# Default: all
lod_levels = all
