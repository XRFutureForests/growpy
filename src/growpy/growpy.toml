# GrowPy Central Configuration
# All CLI scripts read defaults from this file.
# CLI arguments override these values when provided.
#
# Resolution order: dataclass defaults -> growpy.toml -> CLI arguments
#
# To use a custom config path, set GROWPY_CONFIG environment variable:
#   GROWPY_CONFIG=/path/to/custom.toml python src/growpy/cli/generate_forest.py

[general]
# Random seed for reproducible tree generation (remove to randomize)
random_seed = 42
# Default input CSV with tree positions and species
# Height mode columns: x, y, species, height (optional: z, fid)
# Multi-stage mode columns: x, y, species, cycle_interval, max_cycles
csv_file = "data/input/test.csv"
# Output directory for generated trees (species subdirectories created automatically)
output_dir = "data/output/forest_test_dens000_new10m"
# Enable verbose output for PVE preset generation
verbose = true
# Enable profiling to track execution time of each pipeline step
profile = true

[assets]
# Path to The Grove 2.2 installation directory
# Must contain presets/, twigs/, and textures/ subdirectories
grove_dir = "src/the_grove_22"
# Resize textures to power-of-2 for Unreal Engine virtual textures
# Adds significant processing time; only needed if Grove textures are not already power-of-2
resize_textures = true

[twigs]
# Path to twig directory containing .blend files
# Used as default when convert_twigs.py is run without a positional argument
path = "data/assets/twigs"
# Enable mesh densification (subdivision for Nanite-friendly high-poly silhouettes)
densify = false
# Alpha threshold for silhouette trimming
# 0.05-0.3 = minimal (conservative), 0.5 = moderate (recommended), 0.7 = aggressive
alpha_trim = 0.0 #0.75
# Enable boundary edge smoothing for natural silhouette curves
smooth_boundary = false #true
# Number of Laplacian smoothing passes (1-10)
smooth_iterations = 10
# Smoothing strength per iteration (0.0-1.0)
smooth_factor = 0.25
# Target edge as fraction of average edge (0.1-1.0, lower = denser)
# 1.0 = no subdivision, 0.5 = 50% of avg (recommended), 0.1 = very fine
boundary_edge_mm = 0.025
# Interior decimation ratio for leaf meshes (0.0 = disabled, 0.3 = keep 30%)
# Simplifies interior triangles while preserving alpha-trimmed silhouette edges
interior_decimate_ratio = 0.0 #0.3

[growth_models]
# Maximum growth cycles to simulate (1-250)
# Automatically stops early when growth plateaus
cycles = 50
# Random seeds to average for robust curves (1-10)
# Use 3+ for production, 1 for quick tests
seeds = 1
# Minimum height increase per cycle to consider as growth (meters)
# Lower values = more sensitive plateau detection
height_threshold = 0.05
# Stop after N consecutive cycles without significant growth (1-20)
# Lower values = earlier termination, prevents wasting time on plateaued trees
max_cycles_without_growth = 3
# Maximum simulation time per seed in seconds (10-3600)
# Increase for complex species; prevents stuck simulations
timeout = 300

[forest]
# Quality preset: ultra, high, medium, low, performance
# See [quality.*] sections below for per-preset parameters
quality = "ultra"
# Maximum growth cycles per tree (1-125)
# Trees exceeding this are scaled down proportionally
growth_cycle_limit = 200
# Branch smoothing iterations (0-20, 0 = disabled)
# Higher values = smoother, more organic branches
smooth_iterations = 10
# Include Grove metadata (age, mass, vigor) in USD files
# Increases file size by ~70%; useful for analysis
include_grove_attributes = false
# Apply longevity overrides to prevent tree death at high cycle counts
# Sets drop_decay, drop_weak etc. to low values
longevity_mode = true

[forest.skeleton]
# Skeleton simplification parameters (independent of mesh quality).
# Critical for Unreal Engine's 32,767 bone limit on large trees.
# When not set, values are inherited from the active quality preset.
# Both length and reduce independently reduce bone count.
#
# length = 0.1       # Merge nodes into longer bones (0.0-5.0)
#                    # 0.1 = one bone per node (most), 4.0 = very long bones (fewest)
# reduce = 0.1       # Skip thin side branches (0.0-1.0, most effective reducer)
#                    # 0.1 = keep all, 0.4 = skip thin, 0.8 = only thick main branches
# bias = 0.5         # Bone distribution: 0 = trunk-heavy, 1 = tip-heavy
# connected = true   # Connected bone chains (required for animation, more bones)

[export]
# Export mode: "unreal" (full USD+skeleton pipeline) or "helios" (direct OBJ, no bone limit)
# "helios" mode skips skeleton building, bone tagging, USD generation, and all Unreal outputs.
# Trees are exported directly from Grove models to OBJ - significantly faster and no bone count limit.
mode = "helios"
# Skip PVE preset JSON generation (saves ~3% export time)
# PVE presets only needed for Unreal Procedural Vegetation Editor
skip_pve_json = false
# Skip assembly validation (saves ~5-10% export time)
skip_validation = true
# Generate static mesh assemblies alongside skeletal
# Static meshes have full PBR materials but no animation support
include_static = false
# Fast mode: skip PVE JSON, validation, and static meshes
# Equivalent to skip_pve_json + skip_validation combined
fast = false

[unreal]
# Generate Unreal Python import script (unreal_import_trees.py / unreal_cleanup_trees.py)
import_to_unreal = true
# Unreal content path for imported assets in Content Browser
project_path = "/Game/GrowPy/Trees"

[helios]
# Export OBJ/MTL files for Helios++ LiDAR simulation
# Converts USDA assemblies to Wavefront OBJ with baked twig instances
export_obj = true
# Stem/branch decimation ratio (0.0-1.0, lower = fewer polygons)
# For LiDAR, twig positions matter more than stem detail
stem_decimate_ratio = 1.0
# Twig decimation ratio for OBJ export (0.0-1.0, lower = fewer polygons)
twig_decimate_ratio = 1.0
# Generate Helios++ scene XML placing all tree OBJs at CSV positions
helios_scene = true
# Export a single combined OBJ with all trees positioned at CSV coordinates
combined_obj = true

# Quality Presets (single source of truth)
# Define any number of named presets below as [quality.<name>] sections.
# The [forest] quality setting selects which preset to use by name.
# Any omitted key falls back to the built-in default in quality.py.
#
# Mesh Parameters:
#   resolution          - Branch cross-section vertices (8-32)
#   resolution_reduce   - Vertex reduction on thinner branches (0.0-1.0)
#   texture_repeat      - Bark texture tiling count (1-4)
#   build_cutoff_age    - Skip branches younger than N years (0 = keep all)
#   build_cutoff_thickness - Skip branches thinner than this (meters, 0.0 = keep all)
#   build_blend         - Smooth branch junctions
#   build_end_cap       - Cap open branch ends
#
# Skeleton Parameters:
#   skeleton_length     - Bone length multiplier (0.0-5.0, higher = fewer longer bones)
#   skeleton_reduce     - Thickness threshold (0.0-1.0, higher = skip thinner branches)
#   skeleton_bias       - Bone distribution (0.0-1.0, 0 = trunk, 1 = tips)
#   skeleton_connected  - Connected bone chains (required for animation)

[quality.ultra]
resolution = 32
resolution_reduce = 0.75
texture_repeat = 4
build_cutoff_age = 0
build_cutoff_thickness = 0.0
build_blend = true
build_end_cap = true
skeleton_length = 0.1
skeleton_reduce = 0.1
skeleton_bias = 0.5
skeleton_connected = true

[quality.high]
resolution = 24
resolution_reduce = 0.8
texture_repeat = 3
build_cutoff_age = 0
build_cutoff_thickness = 0.01
build_blend = true
build_end_cap = true
skeleton_length = 0.25
skeleton_reduce = 0.2
skeleton_bias = 0.5
skeleton_connected = true

[quality.medium]
resolution = 16
resolution_reduce = 0.8
texture_repeat = 3
build_cutoff_age = 1
build_cutoff_thickness = 0.01
build_blend = true
build_end_cap = true
skeleton_length = 2.0
skeleton_reduce = 0.4
skeleton_bias = 0.5
skeleton_connected = true

[quality.low]
resolution = 12
resolution_reduce = 0.85
texture_repeat = 2
build_cutoff_age = 1
build_cutoff_thickness = 0.05
build_blend = true
build_end_cap = false
skeleton_length = 3.0
skeleton_reduce = 0.6
skeleton_bias = 0.5
skeleton_connected = true

[quality.performance]
resolution = 8
resolution_reduce = 0.9
texture_repeat = 2
build_cutoff_age = 2
build_cutoff_thickness = 0.05
build_blend = false
build_end_cap = false
skeleton_length = 4.0
skeleton_reduce = 0.8
skeleton_bias = 0.5
skeleton_connected = true

[quality.helios]
resolution = 8
resolution_reduce = 0.9
texture_repeat = 2
build_cutoff_age = 0
build_cutoff_thickness = 0
build_blend = false
build_end_cap = false
skeleton_length = 4.0
skeleton_reduce = 0.8
skeleton_bias = 0.5
skeleton_connected = true

[quality.tom]
resolution = 8
resolution_reduce = 0.75
texture_repeat = 2
build_cutoff_age = 0
build_cutoff_thickness = 0.0
build_blend = true
build_end_cap = true
skeleton_length = 0.1
skeleton_reduce = 0.1
skeleton_bias = 0.5
skeleton_connected = true