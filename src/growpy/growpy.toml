# GrowPy Central Configuration
# All CLI scripts read defaults from this file.
# CLI arguments override these values when provided.
#
# Resolution order: dataclass defaults -> growpy.toml -> CLI arguments
#
# To use a custom config path, set GROWPY_CONFIG environment variable:
#   GROWPY_CONFIG=/path/to/custom.toml python src/growpy/cli/generate_forest.py

[general]
# Random seed for reproducible tree generation (remove to randomize)
random_seed = 27
# Default input CSV with tree positions and species
# CSV columns: x, y, species, height (optional: z, fid, dbh)
csv_file = "data/input/dataset/all_species.csv"
# Output directory for generated trees (species subdirectories created automatically)
output_dir = "data/output/forest"
# Enable verbose output (INFO-level logging). Use --verbose / --quiet to override.
verbose = true
# Enable profiling to track execution time of each pipeline step
profile = true

# --- Step 1: prepare_assets.py ---
[assets]
# Path to The Grove 2.3 installation directory
# Must contain presets/, twigs/, and textures/ subdirectories
grove_dir = "src/the_grove_23"
# Resize textures to power-of-2 for Unreal Engine virtual textures
# Adds significant processing time; only needed if Grove textures are not already power-of-2
resize_textures = true

# --- Step 2: convert_twigs.py ---
[twigs]
# Path to twig directory containing .blend files
# Used as default when convert_twigs.py is run without a positional argument
path = "data/assets/twigs"
# Directory for custom (non-Grove) twig .blend files with textures
# Copied to data/assets/twigs/ by prepare_assets.py alongside Grove twigs
# Use for hand-curated twigs (e.g., Helios-classified variants with fruit materials)
custom_twigs_dir = "data/input/custom_twigs"
# Master switch for all mesh geometry processing (alpha trim, smoothing, decimation)
# When false, .blend twig meshes are exported to USD as-is without any modification
# When true, enables the sub-options below for Nanite-friendly high-poly silhouettes
densify = true
# Alpha threshold for silhouette trimming
# 0.05-0.3 = minimal (conservative), 0.5 = moderate (recommended), 0.7 = aggressive
alpha_trim = 0.75
# Enable boundary edge smoothing for natural silhouette curves
smooth_boundary = true
# Number of Laplacian smoothing passes (1-10)
smooth_iterations = 3
# Smoothing strength per iteration (0.0-1.0)
smooth_factor = 0.125
# Target boundary edge length as fraction of average edge length (0.1-1.0, lower = denser)
# Despite the name, this is NOT in millimeters -- it is a unitless ratio.
# 1.0 = no subdivision, 0.5 = edges split to 50% of avg (recommended), 0.1 = very fine
boundary_edge_mm = 0.0125
# Interior decimation ratio for leaf meshes (0.0 = disabled, 0.3 = keep 30%)
# Simplifies interior triangles while preserving alpha-trimmed silhouette edges
interior_decimate_ratio = 0.25

# --- Step 3: create_growth_models.py ---
[growth_models]
# Maximum growth cycles to simulate (1-250)
# Automatically stops early when growth plateaus
cycles = 25
# Random seeds to average for robust curves (1-10)
# Use 3+ for production, 1 for quick tests
seeds = 1
# Minimum height increase per cycle to consider as growth (meters)
# Lower values = more sensitive plateau detection
height_threshold = 0.01
# Stop after N consecutive cycles without significant growth (1-20)
# Lower values = earlier termination, prevents wasting time on plateaued trees
max_cycles_without_growth = 3
# Maximum simulation time per seed in seconds (10-3600)
# Increase for complex species; prevents stuck simulations
timeout = 300

# --- Step 3b: Yield table calibration (integrated into create_growth_models.py) ---
[calibration]
# When enabled, create_growth_models.py automatically calibrates against yield tables
# after the initial simulation, then re-simulates with calibration applied.
enabled = true
# Align grove height growth to yield table height curve.
# Applies per-cycle grow_length multipliers from calibrated seed.json files during
# simulation (step 4). Only affects overall growth speed, not branch shape.
# When cycles exceed the calibration array length, the last value is held.
# false = use original Grove grow_length values from seed.json (no height alignment)
align_height = true
# Align grove trunk DBH to yield table DBH curve.
# Applies radial scaling at export to match target DBH from calibrated seed.json files.
# Scales trunk mesh perpendicular to bone axes at breast height (1.3m), blending
# smoothly to 1.0 at the crown. Only affects trunk thickness, not branch shape.
# false = export Grove geometry as-is (trunk may be thicker/thinner than yield table)
align_dbh = true
# Directory for local yield table CSVs.
# Format: age,height,dbh (age in years, height in meters, dbh in centimeters)
# File naming: <standardized_species_name>.csv (e.g., norway_spruce.csv)
yield_tables_dir = "data/input/yield_tables"
# Generate comparison plots (even without calibration)
# Plots are saved alongside growth models in data/assets/growth_models/<species>/
plot = true
# Yield table resolution order per species:
#   1. Local CSV in yield_tables_dir (by standardized name)
#   2. Ingested store (pylometree-ingest output in yield_sources.store_dir)
# Species without yield data use uncalibrated Grove output for both height and DBH.

# --- Yield table store ---
# Pre-ingested yield tables from pylometree providers.
# Run: pylometree-ingest --store-dir data/input/yield_tables/store
[yield_sources]
# Directory for the normalized yield table store (ingested CSVs + manifest)
store_dir = "data/input/yield_tables/store"
# Preferred region filter for table selection (case-insensitive exact match)
# Current store regions: "DE", "DE-NW", "DE-Central", "EU-West"
# Empty string = no filter (selects from all regions by best site index)
preferred_region = ""
# Preferred site index for table selection (closest match).
# Uses the provider's site index scale (e.g., German Ertragsklasse: 1=best).
# The manifest h50 column (height at age 50 in meters) provides a universal
# metric for cross-referencing with other SI definitions.
# When set, overrides the automatic grove h50-based selection for all species.
# Per-species overrides in [calibration.species."..."] take priority.
# 0 = no preference (auto-select by simulated grove h50)
preferred_site_index = 0

# --- Dataset CSV planner ---
[dataset]
# Number of competition neighbors around the center tree (3, 4, 5, or 6)
# Neighbors are placed in a regular polygon at species-specific spacing.
# 3 = equilateral triangle, 4 = square, 5 = pentagon, 6 = hexagon
competition_neighbors = 3

# --- Step 4: generate_forest.py ---
[forest]
# Quality preset: ultra, high, medium, low, performance
# See [quality.*] sections below for per-preset parameters
quality = "high"
# Maximum growth cycles per tree (1-250)
# Trees exceeding this limit are capped (not scaled)
growth_cycle_limit = 25
# Number of grove.smooth() passes on branch angles (int, 0-20, 0 = disabled)
# Each pass reduces sharp corner angles between branch segments.
# Higher values = smoother, more organic branches; 10-20 for production.
smooth_iterations = 3
# Include Grove metadata (age, mass, vigor) in USD files
# Increases file size by ~70%; useful for analysis
include_grove_attributes = false
# Multi-stage export: generate tree models at height intervals
# Exports snapshots every N meters of height (e.g., 5 = 5m, 10m, 15m...)
# Uses growth models to determine which cycle corresponds to each height milestone
# Each snapshot includes height and DBH in the filename for easy asset selection
# 0 = disabled (standard single height-based export)
height_interval = 3
# Cap all tree heights at this value in meters (e.g., 15 for quick testing)
# Trees taller than this in the input CSV are clamped to this height
# Reduces growth cycles and number of height stages for faster runs
# 0 = no limit (use full CSV heights)
max_height = 9

# Quality Presets (single source of truth)
# Define any number of named presets below as [quality.<name>] sections.
# The [forest] quality setting selects which preset to use by name.
# Any omitted key falls back to the built-in default in quality.py.
#
# Mesh Parameters:
#   resolution            - Cross-section vertex count at trunk base (int, 8-32)
#   resolution_reduce     - How fast vertex count drops on thinner branches (0.0-1.0,
#                           0.0 = uniform, 1.0 = very fast reduction)
#   build_cutoff_age      - Skip branches younger than N growth cycles (0 = keep all)
#   build_cutoff_thickness - Min branch diameter in meters to include (0.0 = keep all,
#                           e.g. 0.005 = skip branches thinner than 5 mm)
#   build_blend           - Extra geometry for smooth branch junctions
#   build_end_cap         - Close off open branch ends with geometry
#
# Skeleton Parameters (control bone count -- Unreal 16-bit limit = 32,767 bones):
#   skeleton_length     - Min bone length in meters (0.0-5.0, Grove default 2.0 m).
#                         Nodes are skipped until a bone reaches this length.
#                         Lower = more bones (finer), higher = fewer bones (coarser).
#   skeleton_reduce     - Branch thickness threshold, unitless (0.0-1.0, Grove default 0.4).
#                         Thin side branches below this threshold get no bones.
#                         Squared internally before passing to Grove API.
#   skeleton_bias       - Bone density distribution (0.0-1.0, default 0.5).
#                         0.0 = more bones on trunk/base, 1.0 = more bones at tips.
#   skeleton_connected  - Connected bone chains vs floating bones.
#                         true = required for Unreal skeletal mesh animation.

[quality.high]
resolution = 16
resolution_reduce = 0.5
build_cutoff_age = 0
build_cutoff_thickness = 0.005
build_blend = true
build_end_cap = true
skeleton_length = 1.0
skeleton_reduce = 0.3
skeleton_bias = 0.5
skeleton_connected = true

[quality.helios]
resolution = 9
resolution_reduce = 0.75
build_cutoff_age = 0
build_cutoff_thickness = 0
build_blend = false
build_end_cap = false
skeleton_length = 2.0
skeleton_reduce = 0.8
skeleton_bias = 0.5
skeleton_connected = true

[quality.debug]
resolution = 8
resolution_reduce = 0.5
build_cutoff_age = 0
build_cutoff_thickness = 0.0
build_blend = true
build_end_cap = true
skeleton_length = 2.0
skeleton_reduce = 0.5
skeleton_bias = 0.5
skeleton_connected = true

# --- Step 4 (cont.): Export options ---
[export]
# USD file format: "usda" (ASCII, human-readable) or "usdc" (binary, smaller/faster)
# Binary USDC files are ~50% smaller on disk and faster for UE to parse,
# significantly reducing memory pressure during import.
usd_format = "usda"
# Export skeletal mesh assemblies (required for Unreal animation/wind)
skeletal = true
# Export static mesh assemblies (geometry only, no skeleton)
# When both skeletal and static are enabled, static is derived from skeletal
static = false
# Base twig density multiplier applied to all trees globally.
# Values > 1.0 add synthetic twigs; values < 1.0 thin existing placements.
# Compensates for twig loss from build_cutoff.
# Per-tree scaling: the input CSV twig_density column is a scale factor
# multiplied with this base (e.g., base=2.0, CSV=0.5 -> effective 1.0).
# Range: 0.0 (no twigs) to 3.0+ (dense canopy)
twig_density = 2.75
# Youth bias exponent for synthetic twig placement.
# Controls how strongly additional twigs prefer younger branches.
# 1.0 = linear (default), >1.0 = stronger youth preference, <1.0 = more uniform.
# At 2.0 a branch at youth=0.5 gets 25% weight vs 100% for the youngest.
# Range: 0.0 (uniform placement) to 3.0+ (extreme youth preference)
youth_bias = 2.0
# Skip PVE preset JSON generation (saves ~3% export time)
# PVE presets only needed for Unreal Procedural Vegetation Editor
skip_pve_json = false
# Maximum skeleton joints for Nanite Assembly USD export.
# Nanite encodes bone indices in 8-bit fields (max 256).
# 0 = no limit (use for PVE native skeletal mesh path which has no constraint).
# 250 = safe default for Nanite Assembly USD import path.
max_skeleton_joints = 0
# Skip assembly validation (saves ~5-10% export time)
skip_validation = true
# Only export specific trees by fid (integer array)
# Other trees still participate in growth simulation (light competition, shading)
# but only the listed trees produce output files
# Useful for studying a single tree growing among neighbors
# Empty array = export all trees
export_trees = []
# Density variants: export multiple density levels from a single simulation.
# Each simulation produces one file per variant without re-simulating.
# Empty list (default) = single export using CSV/config twig_density.
# When active, CSV twig_density column is ignored.
density_variants = [] # e.g., ["full", "reduced", "bare"]

# --- Post-export: Unreal import ---
[unreal]
# Generate Unreal Python import script (unreal_import_trees.py / unreal_cleanup_trees.py)
import_to_unreal = true
# Unreal content path for imported assets in Content Browser
project_path = "/Game/Assets/TheGrove"
# Automatically set Nanite shape preservation to Voxelize on imported assemblies.
# Voxelization produces the best visual quality but adds significant import time.
# Set to false for faster testing iterations; re-enable for production exports.
voxelization = false
# Nanite fallback mesh triangle percentage (0.0-1.0).
# The fallback mesh is used when Nanite is unavailable: complex collision
# queries, ray tracing without Nanite RT, mobile, editor "Nanite off" view.
# Lower values reduce build time and VRAM at no visual cost when Nanite renders.
# 0.01 = keep 1% of triangles (recommended), 1.0 = keep all (wasteful).
nanite_fallback_percent = 0.01
# Nanite fallback heuristic: "percent_triangles", "relative_error", "auto".
# CRITICAL: if left at engine default (often "auto"/"relative_error"), the
# fallback_percent value above may be silently ignored, leaving fallbacks
# much heavier than intended. Setting this explicitly is the single biggest
# import-perf win for forests where Nanite is always available.
nanite_fallback_target = "percent_triangles"
# Used only when fallback_target = "relative_error". Higher = coarser fallback.
# Default 1.0 is conservative; try 2.0-4.0 for further build-time savings.
nanite_fallback_relative_error = 1.0
# Nanite trim relative error threshold (0.0 = auto).
# Controls how aggressively Nanite simplifies internal LOD hierarchy.
# Higher values allow coarser LODs, reducing build time and streaming data.
# 0.0 = UE default (auto), try 1.0-3.0 for faster builds on organic meshes.
# Epic recommends staying above 0.02; 0.04 is a good default.
nanite_trim_relative_error = 0.0
# Minimum always-resident Nanite data in KB per mesh (0 = single page).
# Lower values reduce baseline VRAM per mesh. 0 is ideal for large forests
# where only a few trees are close at any time.
nanite_target_residency_kb = 0
# Interpolate UVs during Nanite mesh simplification.
# Should be true for textured meshes to avoid UV seam artifacts at distance.
nanite_lerp_uvs = true
# Maximum edge length factor for Nanite simplification (0.0 = disabled).
# Prevents oversimplification of edges on deformable meshes (wind/WPO).
# Set > 0 (e.g., 1.0) if trees use skeletal mesh wind animation.
nanite_max_edge_length_factor = 0.0
# Store explicit per-vertex tangents instead of deriving them implicitly.
# false = smaller assets + faster builds (recommended for vegetation).
# true only if a material specifically depends on baked tangent vectors.
nanite_explicit_tangents = false
# Position quantization precision (-1 = auto). Lower = smaller Nanite data.
# Trees tolerate aggressive precision; -1 lets UE choose per-mesh.
nanite_position_precision = -1
# Normal quantization precision (-1 = auto). Lower = smaller Nanite data.
# Vegetation usually tolerates coarse normals well.
nanite_normal_precision = -1

# --- PVE preset import (UE 5.7+ Procedural Vegetation Editor) ---
# Generates a complementary UE Python script that creates
# ProceduralVegetationPreset DataAssets from per-tree PVE JSON recipes,
# alongside the existing skeletal-mesh assembly import. Requires the
# Procedural Vegetation Editor plugin to be enabled in UE.
generate_pve_presets = true
# Content Browser folder where PVE preset DataAssets will be created.
pve_package_path = "/Game/Assets/TheGrove/PVE"
# Content Browser folder where PVE writes generated foliage assets.
pve_foliage_folder = "/Game/Assets/TheGrove/PVE/Foliage"
# Content Browser folder where PVE writes generated materials.
pve_materials_folder = "/Game/Assets/TheGrove/PVE/Materials"

# --- Post-export: Helios++ LiDAR ---
[helios]
# Export OBJ/MTL files for Helios++ LiDAR simulation
# Converts USDA assemblies to Wavefront OBJ with baked twig instances
export_obj = false
# Generate Helios++ scene XML placing all tree OBJs at CSV positions
individual_obj = false
helios_scene = false
# Also export individual per-tree OBJ files (default: false, only combined OBJ)
# OBJ coordinate up axis: "y" (standard OBJ/Blender) or "z" (matches USD/Helios)
obj_up_axis = "y"

# Material-aware mesh simplification applied in-memory before OBJ write.
# Reduces file size and Helios++ processing time without re-reading/re-writing files.
# Material classification: "bark" = trunk/branch, "wood" = twig wood sub-materials,
# "leaf" = leaf/foliage (preserve for LAI). Uses WOOD_KEYWORDS for detection.
[helios.simplification]
enabled = false
# Bark/trunk simplification ratio (0.0-1.0, 0.2 = keep 20% of faces)
bark = 0.2
# Twig wood simplification ratio (0.0-1.0)
wood = 0.2
# Leaf simplification ratio - global default (1.0 = keep all, critical for LAI accuracy)
# Override per species in [helios.simplification.leaf_per_species] below.
leaf = 0.5
# Fruit simplification ratio (0.0-1.0, e.g. EuropeanOakFruits)
fruit = 0.2

# Per-species leaf simplification overrides.
# Keys are species_clean names (lowercase, underscores). Species not listed
# here fall back to the global "leaf" value above.
[helios.simplification.leaf_per_species]
# selected_european_beech = 0.2
# selected_european_oak = 0.4
# selected_scots_pine = 0.3

# --- Density Variant Definitions ---
# Each variant can override build_cutoff and twig_density from the quality preset.
# Only keys listed here override; others inherited from active [quality.*] preset.
# Referenced by name in export.density_variants list above.

[density_variant.full]
twig_density = 1.5

[density_variant.reduced]
twig_density = 0.75
build_cutoff_thickness = 0.01 # meters diameter (same unit as quality preset)

[density_variant.bare]
twig_density = 0.25
build_cutoff_thickness = 0.02 # meters diameter

# --- Competition Groups ---
# Thinning schedules and planting distances by silvicultural group.
# Species-to-group assignment is in tree_asset_lookup.csv (Competition Group column).
# Groups are driven by crown size, shade tolerance, and growth rate.
#
# Thinning schedule: list of [height_trigger_m, target_distance_m] pairs.
# When a center competition tree crosses the height trigger, neighbors are
# repositioned to the target distance from the center tree.
#
# Species not found in the lookup CSV fall back to competition.default_group.

[competition]
default_group = "slow_broadleaf"

[competition.groups.fast_conifer]
planting_distance = 2.25                     # meters between trees at planting
thinning = [[10, 3.5], [15, 5.0], [20, 6.0]] # [height_m, distance_m]

[competition.groups.slow_conifer]
planting_distance = 2.75                     # meters
thinning = [[10, 4.0], [15, 5.5], [20, 6.5]]

[competition.groups.fast_broadleaf]
planting_distance = 2.25                     # meters
thinning = [[10, 3.5], [15, 5.0], [20, 6.0]]

[competition.groups.slow_broadleaf]
planting_distance = 3.0                      # meters
thinning = [[10, 4.5], [15, 6.0], [20, 7.0]]
