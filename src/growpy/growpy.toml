# GrowPy Central Configuration
# All CLI scripts read defaults from this file.
# CLI arguments override these values when provided.
#
# Resolution order: dataclass defaults -> growpy.toml -> CLI arguments
#
# To use a custom config path, set GROWPY_CONFIG environment variable:
#   GROWPY_CONFIG=/path/to/custom.toml python src/growpy/cli/generate_forest.py

[general]
# Random seed for reproducible tree generation (remove to randomize)
random_seed = 42
# Default input CSV with tree positions
csv_file = "data/input/test.csv"
# Output directory for generated trees
output_dir = "data/output/forest"
# Enable verbose output
verbose = false
# Enable profiling to track execution time
profile = false

[assets]
# Path to The Grove 2.2 installation directory
grove_dir = "src/the_grove_22"
# Resize textures to power-of-2 for Unreal Engine (slow)
resize_textures = true

[twigs]
# Enable mesh densification (subdivision for Nanite)
densify = true
# Alpha threshold for silhouette trimming (0.1-0.7)
alpha_trim = 0.5
# Enable boundary edge smoothing
smooth_boundary = true
# Number of Laplacian smoothing passes (1-10)
smooth_iterations = 3
# Smoothing strength per iteration (0.0-1.0)
smooth_factor = 0.25
# Target edge as fraction of average edge (0.1-1.0, lower = denser)
boundary_edge_mm = 0.1

[growth_models]
# Maximum growth cycles to simulate (1-250)
cycles = 50
# Random seeds to average for robust curves (1-10)
seeds = 1
# Minimum height increase per cycle to consider as growth (meters)
height_threshold = 0.05
# Stop after N consecutive cycles without significant growth (1-20)
max_cycles_without_growth = 3
# Maximum simulation time per seed in seconds (10-3600)
timeout = 300

[forest]
# Quality preset: ultra, high, medium, low, performance
quality = "ultra"
# Maximum growth cycles per tree (1-125, trees exceeding are scaled down)
growth_cycle_limit = 50
# Branch smoothing iterations (0-20, 0 = disabled)
smooth_iterations = 10
# Include Grove metadata in USD (increases file size ~70%)
include_grove_attributes = false
# Apply longevity overrides to prevent tree death at high cycles
longevity_mode = true

[forest.skeleton]
# Skeleton simplification parameters.
# When not set, values are inherited from the quality preset.
# Uncomment to override:
# length = 0.1       # Merge nodes into longer bones (0.0-5.0)
# reduce = 0.1       # Skip thin side branches (0.0-1.0, most effective)
# bias = 0.5         # Bone distribution: 0 = trunk, 1 = tips
# connected = true   # Connected bone chains (required for animation)

[export]
# Skip PVE preset JSON generation (saves ~3% export time)
skip_pve_json = false
# Skip assembly validation (saves ~5-10% export time)
skip_validation = true
# Generate static mesh assemblies alongside skeletal
include_static = false
# Fast mode: skip PVE JSON, validation, and static meshes
fast = false

[unreal]
# Generate Unreal Python import script
import_to_unreal = true
# Unreal content path for imported assets
project_path = "/Game/GrowPy/Trees"

[helios]
# Export OBJ/MTL files for Helios++ LiDAR simulation
export_obj = false
# Twig decimation ratio for OBJ export (0.0-1.0, lower = fewer polygons)
decimate_ratio = 0.3
# Generate Helios++ scene XML (implies export_obj)
helios_scene = false

[build]
# LOD levels to export: "all" or comma-separated list
lod_levels = "all"

# Quality Presets
# Each preset defines mesh resolution, skeleton simplification, and build options.
# The [forest] quality setting selects which preset to use.
# You can customize any preset below; changes take effect when that preset is active.
#
# Mesh Parameters:
#   resolution          - Branch cross-section vertices (8-32)
#   resolution_reduce   - Vertex reduction on thinner branches (0.0-1.0)
#   texture_repeat      - Bark texture tiling count (1-4)
#   build_cutoff_age    - Skip branches younger than N years (0 = keep all)
#   build_cutoff_thickness - Skip branches thinner than this (meters, 0.0 = keep all)
#   build_blend         - Smooth branch junctions
#   build_end_cap       - Cap open branch ends
#
# Skeleton Parameters:
#   skeleton_length     - Bone length multiplier (0.0-5.0, higher = fewer longer bones)
#   skeleton_reduce     - Thickness threshold (0.0-1.0, higher = skip thinner branches)
#   skeleton_bias       - Bone distribution (0.0-1.0, 0 = trunk, 1 = tips)
#   skeleton_connected  - Connected bone chains (required for animation)

[quality.ultra]
resolution = 32
resolution_reduce = 0.75
texture_repeat = 4
build_cutoff_age = 0
build_cutoff_thickness = 0.0
build_blend = true
build_end_cap = true
skeleton_length = 0.1
skeleton_reduce = 0.1
skeleton_bias = 0.5
skeleton_connected = true

[quality.high]
resolution = 24
resolution_reduce = 0.8
texture_repeat = 3
build_cutoff_age = 0
build_cutoff_thickness = 0.01
build_blend = true
build_end_cap = true
skeleton_length = 0.25
skeleton_reduce = 0.2
skeleton_bias = 0.5
skeleton_connected = true

[quality.medium]
resolution = 16
resolution_reduce = 0.8
texture_repeat = 3
build_cutoff_age = 1
build_cutoff_thickness = 0.01
build_blend = true
build_end_cap = true
skeleton_length = 2.0
skeleton_reduce = 0.4
skeleton_bias = 0.5
skeleton_connected = true

[quality.low]
resolution = 12
resolution_reduce = 0.85
texture_repeat = 2
build_cutoff_age = 1
build_cutoff_thickness = 0.05
build_blend = true
build_end_cap = false
skeleton_length = 3.0
skeleton_reduce = 0.6
skeleton_bias = 0.5
skeleton_connected = true

[quality.performance]
resolution = 8
resolution_reduce = 0.9
texture_repeat = 2
build_cutoff_age = 2
build_cutoff_thickness = 0.05
build_blend = false
build_end_cap = false
skeleton_length = 4.0
skeleton_reduce = 0.8
skeleton_bias = 0.5
skeleton_connected = false
